<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroPlay — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: radial-gradient(circle at top, #1e2230, #0d0e12 60%);
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .login-card {
            width: 370px;
            background-color: #15171e;
            border: 1px solid #242936;
            border-radius: 14px;
        }

        .form-control {
            background-color: #1e2230;
            border: 1px solid #2d3349;
            color: #ffffff;
        }

        .form-control:focus {
            background-color: #1e2230;
            color: #ffffff;
            border-color: #ffc107;
            box-shadow: none;
        }

        .brand-icon {
            font-size: 3rem;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center" data-bs-theme="dark">

    <main class="card login-card p-4 shadow-lg">
        <div class="text-center mb-4">
            <div class="brand-icon">🕹️</div>
            <h3 class="fw-bold text-white mb-1">RETROPLAY</h3>
            <p class="text-white-50 small mb-0">Ingreso al Panel de Administración</p>
        </div>

        <div id="alert-error" class="alert alert-danger d-none py-2 small text-center"></div>

        <form id="login-form">
            <div class="mb-3">
                <label for="username" class="form-label text-white-50 fw-bold small">USUARIO</label>
                <input type="text" id="username" class="form-control" autocomplete="username" required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label text-white-50 fw-bold small">CONTRASEÑA</label>
                <input type="password" id="password" class="form-control" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold" id="btn-login">
                ENTRAR
            </button>
        </form>

        <a href="/" class="text-center d-block mt-4 small text-white-50 text-decoration-none">
            ← Volver al catálogo
        </a>
    </main>

    <script>
        const loginForm = document.getElementById('login-form');
        const alertError = document.getElementById('alert-error');
        const btnLogin = document.getElementById('btn-login');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            alertError.classList.add('d-none');

            if (!username || !password) {
                mostrarError('Debes ingresar usuario y contraseña.');
                return;
            }

            btnLogin.disabled = true;
            btnLogin.textContent = 'INGRESANDO...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.success) {
                    window.location.href = '/admin';
                } else {
                    mostrarError(data.message || 'Usuario o contraseña incorrectos.');
                }

            } catch (error) {
                mostrarError('No se pudo conectar con el servidor.');
            } finally {
                btnLogin.disabled = false;
                btnLogin.textContent = 'ENTRAR';
            }
        });

        function mostrarError(mensaje) {
            alertError.textContent = mensaje;
            alertError.classList.remove('d-none');
        }
    </script>

</body>

</html>
